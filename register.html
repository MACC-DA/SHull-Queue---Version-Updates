<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>Register - SHull Queue</title>
</head>
<body>
    <div class="shull-card">
        <h1>SHull Queue Controller</h1>
        <h2>Create Account</h2>
        
        <form action="/register" method="POST">
            <div class="form-group">
                <label for="tcn">TCN :</label>
                <input type="text" id="tcn" name="tcn" placeholder="Ex. A00000 or a00000" required>
            </div>
            <div class="form-group">
                <label for="first_name">First Name :</label>
                <input type="text" id="first_name" name="first_name" placeholder="Juan" required>
            </div>
            <div class="form-group">
                <label for="last_name">Last Name :</label>
                <input type="text" id="last_name" name="last_name" placeholder="Dela Cruz" required>
            </div>
            <div class="form-group">
                <label for="nickname">Nickname :</label>
                <input type="text" id="nickname" name="nickname" placeholder="Mang Juan" required>
            </div>

            {# Fixed red note seen in image_4.png #}
            <p class="note-message error">Note: Always remember the nickname you entered.</p>

            <div class="button-container">
                <button type="submit" class="shull-button">Register</button>
            </div>
        </form>

        <div class="footer-link">
            Already have an account? <a href="/login">Log-in Here</a>
        </div>
    </div>
</body>
</html>
