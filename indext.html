<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SHull Queue Controller</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: #f4f7f6;
  display: flex;
  justify-content: center;
  padding: 20px;
}

/* ✅ REGISTER BUTTON (TOP-LEFT FIXED) */
.register-btn {
  position: fixed;
  top: 15px;
  left: 15px;
  background-color: #1a73e8;
  color: white;
  padding: 10px 18px;
  text-decoration: none;
  border-radius: 6px;
  font-weight: bold;
  z-index: 9999;
}

.register-btn:hover {
  background-color: #1558b0;
}

.container {
  background: white;
  padding: 2rem;
  border-radius: 12px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.1);
  width: 100%;
  max-width: 1150px;
}

h2 {
  text-align: center;
  border-bottom: 3px solid #1a73e8;
  padding-bottom: 10px;
  margin-bottom: 20px;
}

.input-group {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
}

input {
  flex: 1;
  padding: 12px;
  border-radius: 8px;
  border: 2px solid #ddd;
}

.add-btn {
  background: #1a73e8;
  color: white;
  border: none;
  border-radius: 8px;
  padding: 10px 25px;
  font-weight: bold;
  cursor: pointer;
}

table {
  width: 100%;
  border-collapse: collapse;
}

th, td {
  padding: 14px;
  text-align: center;
  border-bottom: 1px solid #eee;
}

th {
  background: #f8f9fa;
  font-size: .75rem;
  text-transform: uppercase;
}

.status-pill {
  padding: 6px 12px;
  border-radius: 20px;
  font-size: .8rem;
  font-weight: bold;
}

.waiting { background:#eee; color:#666; }
.ongoing { background:#e3f2fd; color:#1565c0; border:1px solid #1565c0; }
.done { background:#e8f5e9; color:#2e7d32; }

.btn-group {
  display: flex;
  gap: 6px;
  justify-content: center;
}

.action-btn {
  padding: 6px 12px;
  border: none;
  border-radius: 4px;
  cursor: pointer;
  font-size: .75rem;
  font-weight: bold;
  color: white;
}

.btn-og { background:#17a2b8; }
.btn-done { background:#28a745; }
.btn-pass { background:#6c757d; }
.btn-delete { background:#dc3545; }

.time-text, .result-text {
  font-family: monospace;
  font-weight: bold;
}
</style>

<!-- ✅ SUPABASE SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = "https://varjyniqlnttcuvmwvvz.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZhcmp5bmlxbG50dGN1dm13dnZ6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxMzc1MzksImV4cCI6MjA5MTcxMzUzOX0.OLOQdw2TBP-xzCdEXGL21jRIFh2s9bNiokr23qYwv1c";

const supabaseClient = window.supabase.createClient(
  SUPABASE_URL,
  SUPABASE_ANON_KEY
);
</script>
</head>

<body>

<!-- ✅ REGISTER BUTTON -->
<a href="register.html" class="register-btn">Register</a>

<div class="container">
  <h2>SHull Queue Controller</h2>

  <div class="input-group">
    <input id="nameInput" placeholder="SmartHULL User">
    <button class="add-btn" onclick="addToQueue()">Add to Queue</button>
  </div>

  <table>
    <thead>
      <tr>
        <th>Name</th>
        <th>Start</th>
        <th>End</th>
        <th>Status</th>
        <th>Remarks</th>
        <th>Time Consumed</th>
      </tr>
    </thead>
    <tbody id="queueBody"></tbody>
  </table>
</div>

<script>
let queueBody, nameInput, currentData = [];

window.onload = () => {
  queueBody = document.getElementById("queueBody");
  nameInput = document.getElementById("nameInput");

  nameInput.addEventListener("keydown", e => {
    if (e.key === "Enter") {
      e.preventDefault();
      addToQueue();
    }
  });

  loadFromDB();
  setInterval(loadFromDB, 30000);
};

async function loadFromDB() {
  const { data } = await supabaseClient
    .from("queue")
    .select("*")
    .order("sort_order", { ascending: true });

  if (!Array.isArray(data)) return;
  currentData = data;
  queueBody.innerHTML = "";
  data.forEach(createRow);
}

function createRow(item) {
  queueBody.innerHTML += `
  <tr>
    <td><strong>${item.name}</strong></td>
    <td>${item.start_time ?? "--"}</td>
    <td>${item.end_time ?? "--"}</td>
    <td><span class="status-pill ${item.status.toLowerCase()}">${item.status}</span></td>
    <td>—</td>
    <td>${item.time_consumed ?? "--"}</td>
  </tr>`;
}

async function addToQueue() {
  const name = nameInput.value.trim();
  if (!name) return;

  await supabaseClient.from("queue").insert([{
    name,
    status: "Waiting",
    sort_order: Date.now()
  }]);

  nameInput.value = "";
  loadFromDB();
}
</script>

</body>
</html>
