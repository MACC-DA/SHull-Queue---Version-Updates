<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHull Queue Controller</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; display: flex; justify-content: center; padding: 20px; color: #333; }
        .container { background: white; padding: 2rem; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 1100px; }
        
        h2 { text-align: center; font-size: 1.8rem; margin-bottom: 20px; position: relative; }
        h2::after { content: ''; display: block; width: 100%; height: 2px; background: #4a76c0; margin-top: 10px; }

        /* Dashboard Layout */
        .dashboard-top { display: flex; gap: 20px; margin-bottom: 30px; }
        
        /* Left Panel: User Info */
        .user-panel { flex: 1; padding: 10px; }
        .user-panel p { margin: 5px 0; font-weight: bold; }
        .user-panel .label { color: #666; width: 60px; display: inline-block; }
        .user-panel .sub-text { color: #999; font-size: 0.85rem; display: block; margin-left: 65px; font-weight: normal; }
        .add-btn { background: #4a76c0; color: white; border: none; border-radius: 8px; padding: 12px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 15px; font-size: 1rem; }

        /* Right Panel: Current User Spotlight */
        .current-user-card { flex: 3; background: #e0e0e0; border-radius: 15px; padding: 15px; position: relative; }
        .current-user-card h4 { margin: 0 0 10px 0; font-size: 0.9rem; }
        .spotlight-table { width: 100%; border-collapse: collapse; background: transparent; }
        .spotlight-table th { font-size: 0.75rem; color: #555; text-align: left; padding: 5px; border-bottom: 1px solid #ccc; }
        .spotlight-table td { padding: 10px 5px; vertical-align: middle; }
        .timer-note { font-size: 0.75rem; text-align: center; margin-top: 10px; color: #444; width: 100%; }

        /* Main Table Styles */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: #f8f9fa; color: #888; font-size: 0.7rem; text-transform: uppercase; padding: 12px; }
        td { padding: 15px 12px; text-align: center; border-bottom: 1px solid #f0f0f0; font-size: 0.9rem; }
        .name-cell { font-weight: bold; text-align: left; }

        /* Status Pills */
        .status-pill { padding: 5px 15px; border-radius: 15px; font-size: 0.75rem; font-weight: bold; }
        .waiting { background: #eee; color: #777; }
        .ongoing { background: #fff; color: #333; border: 1px solid #ccc; }
        .done { background: #e8f5e9; color: #4caf50; }
        .remark-pill { background: #b0c4de; color: #4682b4; padding: 5px 15px; border-radius: 10px; font-weight: bold; }

        /* Actions */
        .btn-group { display: flex; gap: 5px; }
        .action-btn { border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; color: white; font-weight: bold; font-size: 0.75rem; }
        .btn-og { background: #17a2b8; }
        .btn-pass { background: #6c757d; }
        .btn-del { background: #dc3545; }
        .btn-done { background: #28a745; }
    </style>
</head>
<body>

<div class="container">
    <h2>SHull Queue Controller</h2>

    <div class="dashboard-top">
        <!-- Sidebar User Section -->
        <div class="user-panel">
            <p><span class="label">TCN :</span> <span id="displayTCN">{{ tcn }}</span></p>
            <p><span class="label">User :</span> <span id="displayNickname">{{ nickname }}</span></p>
            <span class="sub-text">{{ first_name }} {{ last_name }}</span>
            <button class="add-btn" onclick="addToQueue()">Add to Queue</button>
        </div>

        <!-- Spotlight Section for Ongoing Task -->
        <div class="current-user-card" id="spotlightArea">
            <h4>Current User:</h4>
            <table class="spotlight-table">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Start</th>
                        <th>Status</th>
                        <th>Remarks</th>
                    </tr>
                </thead>
                <tbody id="spotlightBody">
                    <!-- Dynamic ongoing task appears here -->
                    <tr><td colspan="4" style="text-align:center; color:#888;">No active task</td></tr>
                </tbody>
            </table>
            <div class="timer-note">Note: If there is no response within 30 seconds, it will proceed to the next user.</div>
        </div>
    </div>

    <!-- Main Queue Table -->
    <table>
        <thead>
            <tr>
                <th style="text-align:left;">Name</th>
                <th>Start</th>
                <th>End</th>
                <th>Status</th>
                <th>Remarks</th>
                <th>Time Consumed</th>
            </tr>
        </thead>
        <tbody id="queueBody"></tbody>
    </table>
</div>

<script>
    const SUPABASE_URL = "https://dpozdmlfmyqikesgjiur.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRwb3pkbWxmbXlxaWtlc2dqaXVyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwMjQ2NjYsImV4cCI6MjA5MTYwMDY2Nn0.a60aUUFBP-4HaGKKxfwpRJKk73Z8WNJX_N_G3SMuJso";
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let currentData = [];

    async function loadData() {
        const { data } = await supabase.from('queue').select('*').order('sort_order', { ascending: true });
        currentData = data || [];
        renderQueue();
    }

    function renderQueue() {
        const qBody = document.getElementById('queueBody');
        const sBody = document.getElementById('spotlightBody');
        qBody.innerHTML = '';
        sBody.innerHTML = '<tr><td colspan="4" style="text-align:center; color:#888;">No active task</td></tr>';

        currentData.forEach(item => {
            if (item.status === 'On-going') {
                // Fill Spotlight
                sBody.innerHTML = `
                    <tr>
                        <td><strong>${item.name}</strong></td>
                        <td>${item.start_time}</td>
                        <td>Waiting<br><small>30s</small></td>
                        <td><button class="action-btn btn-done" onclick="setDone(${item.id})">Done</button></td>
                    </tr>
                `;
            }

            // Fill Main Table
            const isDone = item.status === 'Done';
            const actions = item.status === 'Waiting' ? `
                <div class="btn-group">
                    <button class="action-btn btn-og" onclick="setOngoing(${item.id})">On-going</button>
                    <button class="action-btn btn-pass" onclick="passRow(${item.id})">Pass</button>
                    <button class="action-btn btn-del" onclick="deleteRow(${item.id})">X</button>
                </div>
            ` : (isDone ? '<span class="remark-pill">Completed</span>' : '');

            qBody.innerHTML += `
                <tr>
                    <td class="name-cell">${item.name}</td>
                    <td>${item.start_time || '--'}</td>
                    <td>${item.end_time || '--'}</td>
                    <td><span class="status-pill ${item.status.toLowerCase().replace('-','')}">${item.status}</span></td>
                    <td>${actions}</td>
                    <td>${item.time_consumed || '--'}</td>
                </tr>
            `;
        });
    }

    // Logic for Add, Ongoing, Done, etc. remains the same as your previous version
    async function addToQueue() {
        const name = "{{ nickname }}"; 
        await supabase.from('queue').insert([{ name, status: 'Waiting', sort_order: Date.now() }]);
        loadData();
    }

    async function setOngoing(id) {
        if(currentData.some(r => r.status === 'On-going')) return alert("Finish current task first.");
        const now = new Date();
        await supabase.from('queue').update({ 
            status: 'On-going', 
            start_time: now.toLocaleTimeString(), 
            started_at: now.getTime() 
        }).eq('id', id);
        loadData();
    }

    async function setDone(id) {
        const row = currentData.find(r => r.id === id);
        const now = new Date();
        const consumed = Math.floor((now.getTime() - row.started_at)/1000) + "s";
        await supabase.from('queue').update({ 
            status: 'Done', 
            end_time: now.toLocaleTimeString(), 
            time_consumed: consumed 
        }).eq('id', id);
        loadData();
    }

    async function deleteRow(id) { if(confirm("Delete?")) { await supabase.from('queue').delete().eq('id', id); loadData(); } }

    window.onload = loadData;
    setInterval(loadData, 10000); // Auto refresh every 10s
</script>

</body>
</html>
