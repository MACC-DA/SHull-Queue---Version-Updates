<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHull Queue Controller</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 40px; }
        .container { background: white; padding: 2.5rem; border-radius: 40px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 100%; max-width: 1150px; }
        .header-top { display: flex; justify-content: flex-end; }
        .logout-btn { background: #4a76c0; color: white; border: none; border-radius: 8px; padding: 8px 20px; text-decoration: none; font-weight: bold; }
        h2 { text-align: center; border-bottom: 3px solid #4a76c0; padding-bottom: 10px; }
        .dashboard-top { display: flex; gap: 30px; margin-top: 20px; }
        .user-panel { flex: 1; border-right: 1px solid #eee; padding-right: 20px; }
        .user-panel p { margin: 10px 0; font-weight: bold; }
        .sub-text { color: #888; font-size: 0.9rem; display: block; margin-left: 70px; }
        .add-btn { background: #4a76c0; color: white; border: none; border-radius: 12px; padding: 15px; width: 100%; cursor: pointer; font-weight: bold; margin-top: 20px; }
        .current-user-card { flex: 3; background: #e8e8e8; border-radius: 20px; padding: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 30px; }
        th { background: #f8f9fa; padding: 15px; font-size: 0.8rem; }
        td { padding: 15px; text-align: center; border-bottom: 1px solid #eee; }
        .btn-og { background: #17a2b8; color: white; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-top">
            <a href="/logout" class="logout-btn">Logout</a>
        </div>
        <h2>SHull Queue Controller</h2>
        <div class="dashboard-top">
            <div class="user-panel">
                <p>TCN : <span>{{ tcn }}</span></p>
                <p>User : <span>{{ nickname }}</span></p>
                <span class="sub-text">{{ first_name }} {{ last_name }}</span>
                <button class="add-btn" onclick="addToQueue()">Add to Queue</button>
            </div>
            <div class="current-user-card">
                <h4>Current User:</h4>
                <div id="spotlightContent" style="text-align: center; color: #666; padding: 20px;">
                    No active task
                </div>
            </div>
        </div>
        <table>
            <thead>
                <tr>
                    <th>NAME</th>
                    <th>START</th>
                    <th>END</th>
                    <th>STATUS</th>
                    <th>REMARKS</th>
                </tr>
            </thead>
            <tbody id="queueBody"></tbody>
        </table>
    </div>

    <script>
        const SUPABASE_URL = "https://varjyniqlnttcuvmwvvz.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZhcmp5bmlxbG50dGN1dm13dnZ6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxMzc1MzksImV4cCI6MjA5MTcxMzUzOX0.OLOQdw2TBP-xzCdEXGL21jRIFh2s9bNiokr23qYwv1c";
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const loggedInUser = "{{ nickname }}";

        async function loadQueue() {
            const { data } = await supabase.from('queue').select('*').order('sort_order', { ascending: true });
            const qBody = document.getElementById('queueBody');
            qBody.innerHTML = '';
            data.forEach(item => {
                const isOwner = item.name === loggedInUser;
                qBody.innerHTML += `
                    <tr>
                        <td>${item.name}</td>
                        <td>${item.start_time || '--'}</td>
                        <td>${item.end_time || '--'}</td>
                        <td>${item.status}</td>
                        <td>${isOwner && item.status === 'Waiting' ? `<button class="btn-og" onclick="startTask(${item.id})">On-going</button>` : ''}</td>
                    </tr>`;
            });
        }

        async function addToQueue() {
            await supabase.from('queue').insert([{ name: loggedInUser, status: 'Waiting', sort_order: Date.now() }]);
            loadQueue();
        }

        window.onload = loadQueue;
    </script>
</body>
</html>
